<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <!-- Without this, mobile browsers lay the page out at a fake ~980px
       desktop viewport and zoom it to fit, so Flutter's MediaQuery sees
       that wide width instead of the phone's real width — that's what was
       breaking the ResponsiveBreakpoints MOBILE/DESKTOP check (and with
       it the admin portal's menus) on phones in portrait. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="TerraTrack — Agricultural Land Work Management System">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="TerraTrack">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#2D6A4F">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>TerraTrack</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
