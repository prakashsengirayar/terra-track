name: terratrack
description: TerraTrack - Agricultural Land Work Management System
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.1
  cloud_firestore: ^4.15.10
  firebase_storage: ^11.6.10
  firebase_messaging: ^14.7.20
  firebase_auth: ^4.17.8

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.1

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1

  # Image
  image_picker: ^1.0.7

  # Notifications
  flutter_local_notifications: ^17.1.2

  # Persistence
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Utils
  intl: ^0.20.2
  uuid: ^4.4.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  responsive_framework: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/l10n/
